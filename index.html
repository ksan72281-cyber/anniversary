<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Anniversary ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#03000c;font-family:'Nunito',sans-serif;touch-action:none;user-select:none}

canvas{position:fixed;inset:0;z-index:0;display:block}

#ui{position:fixed;inset:0;z-index:10;pointer-events:none}

#date{
  position:absolute;top:22px;left:20px;
  display:flex;align-items:center;gap:10px;
}
#date .heart-icon{font-size:28px;filter:drop-shadow(0 0 8px rgba(255,80,120,.9))}
#date .num{
  display:block;font-family:'Pacifico',cursive;font-size:clamp(18px,4.5vw,26px);color:#fff;
  text-shadow:0 0 14px rgba(255,100,180,.8);line-height:1.1
}
#date .sub{
  display:block;font-size:9px;letter-spacing:4px;color:rgba(220,180,255,.6);
  font-weight:300;text-transform:uppercase;margin-top:2px
}

#caption{
  position:absolute;left:50%;bottom:10%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(10,3,22,.92);border:1px solid rgba(255,150,220,.5);
  color:#ffccee;padding:12px 36px;border-radius:30px;
  font-size:17px;letter-spacing:1px;white-space:nowrap;
  font-family:'Nunito',sans-serif;font-weight:600;
  backdrop-filter:blur(18px);pointer-events:none;
  text-shadow:0 0 12px rgba(255,100,180,.9);
  box-shadow:0 0 20px rgba(255,80,160,.25);
  opacity:0;transition:opacity .4s,transform .4s;
}
#caption.show{opacity:1;transform:translateX(-50%) translateY(0)}

#hint{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:3px;color:rgba(185,135,220,.25);text-align:center
}

.heart{position:fixed;pointer-events:none;z-index:1;animation:fall linear infinite;opacity:0}
@keyframes fall{
  0%  {opacity:0;transform:translateY(-20px) rotate(0deg)}
  15% {opacity:.5}
  85% {opacity:.35}
  100%{opacity:0;transform:translateY(100vh) rotate(40deg)}
}

/* ကြယ်ကြွေ meteor */
.meteor{
  position:fixed;pointer-events:none;z-index:2;
  width:3px;height:3px;
  background:#fff;border-radius:50%;
  box-shadow:0 0 6px 2px rgba(200,200,255,.8);
  animation:meteorfloat linear infinite;
  opacity:0;
}
@keyframes meteorfloat{
  0%  {opacity:0;transform:translate(0,0)}
  10% {opacity:1}
  90% {opacity:.5}
  100%{opacity:0;transform:translate(30vw,90vh)}
}
</style>
</head>
<body>

<div id="ui">
  <div id="date">
    <span class="heart-icon">♡</span>
    <span class="texts">
      <span class="num">Since Dec 1, 2017</span>
      <span class="sub">Our Special Journey</span>
    </span>
  </div>
  <div id="caption"></div>
  <div id="hint">drag to orbit · tap photo to rotate</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ══════════════════════════════════════════
// SCENE
// ══════════════════════════════════════════
const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 0, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x03000c, 1);
document.body.insertBefore(renderer.domElement, document.getElementById('ui'));

// ══════════════════════════════════════════
// ORBIT CONTROLS
// ══════════════════════════════════════════
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping    = true;
controls.dampingFactor    = 0.07;
controls.autoRotate       = true;
controls.autoRotateSpeed  = 0.15;
controls.enablePan        = false;
controls.minDistance      = 2;
controls.maxDistance      = 20;

// ══════════════════════════════════════════
// STARS
// ══════════════════════════════════════════
const starGeo  = new THREE.BufferGeometry();
const starVerts = [];
for(let i=0; i<6000; i++){
  starVerts.push(
    (Math.random()-.5)*900,
    (Math.random()-.5)*900,
    (Math.random()-.5)*900
  );
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo,
  new THREE.PointsMaterial({ color:0xffffff, size:0.35, sizeAttenuation:true })
));

// ══════════════════════════════════════════
// 3D FLOATING HEARTS — အာကာသထဲ ပျံနေတဲ့ heart
// ══════════════════════════════════════════
function makeHeartShape() {
  const s = new THREE.Shape();
  s.moveTo(0, 0.25);
  s.bezierCurveTo( 0,    0.5,  -0.5,  0.5,  -0.5,  0.15);
  s.bezierCurveTo(-0.5, -0.1,  -0.25,-0.35,  0,   -0.55);
  s.bezierCurveTo( 0.25,-0.35,  0.5, -0.1,   0.5,  0.15);
  s.bezierCurveTo( 0.5,  0.5,   0,    0.5,   0,    0.25);
  return s;
}

// အနီရောင် shades — red tones only
const heartColors = [0xff0033, 0xff1144, 0xcc0022, 0xff3355, 0xdd0000, 0xff2244, 0xee0033, 0xff4466];
const floatingHearts = [];

// geometry + material ကို share သုံး (performance အတွက်)
const sharedHeartGeo = new THREE.ExtrudeGeometry(makeHeartShape(), {
  depth: 0.10, bevelEnabled: true, bevelSize: 0.03, bevelThickness: 0.03, bevelSegments: 3
});
const sharedMats = heartColors.map(c =>
  new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.80 })
);

for(let i = 0; i < 4000; i++){
  const mat  = sharedMats[i % sharedMats.length];
  const mesh = new THREE.Mesh(sharedHeartGeo, mat);

  const scale = 0.04 + Math.random() * 0.14;
  mesh.scale.setScalar(scale);

  mesh.position.set(
    (Math.random() - 0.5) * 120,
    (Math.random() - 0.5) * 90,
    (Math.random() - 0.5) * 80
  );
  mesh.rotation.set(
    Math.random() * Math.PI * 2,
    Math.random() * Math.PI * 2,
    Math.random() * Math.PI * 2
  );
  mesh.userData = {
    floatSpeed : 0.15 + Math.random() * 0.30,
    floatAmp   : 0.06 + Math.random() * 0.15,
    rotSpeed   : (Math.random() - 0.5) * 0.010,
    phase      : Math.random() * Math.PI * 2,
    baseY      : mesh.position.y,
  };
  scene.add(mesh);
  floatingHearts.push(mesh);
}

// ══════════════════════════════════════════
// SOLAR SYSTEM — ညာဘက်အပေါ်ထောင့် (သေး)
// ══════════════════════════════════════════
const solarSystem = new THREE.Group();
solarSystem.position.set(3.8, 2.6, 0);   // ညာဘက်ကို ပိုရွှေ့
scene.add(solarSystem);

// နေ (Sun) — glow effect
const sunGeo = new THREE.SphereGeometry(0.18, 32, 32);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd00 });
const sun = new THREE.Mesh(sunGeo, sunMat);
solarSystem.add(sun);

// Sun glow halo
const glowGeo = new THREE.SphereGeometry(0.26, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.18, side: THREE.BackSide });
solarSystem.add(new THREE.Mesh(glowGeo, glowMat));

// ဂြိုဟ်လေးများ
function createPlanet(size, color, distance, speed) {
  const orbitGroup = new THREE.Group();

  // orbit ring — orbitGroup ထဲ ထည့် (planet နဲ့အတူ လည်မယ်)
  // static ring အဖြစ် solarSystem မှာပဲ ထည့် ပြီး rotation မပါစေနဲ့
  const ringGeo = new THREE.RingGeometry(distance - 0.008, distance + 0.008, 64);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.15, transparent: true, side: THREE.DoubleSide });
  const orbitRing = new THREE.Mesh(ringGeo, ringMat);
  // ring ကို solarSystem plane မှာ flat ထားဖို့ x rotation ပေး၊ solarSystem မှာ ထည့်
  orbitRing.rotation.x = Math.PI / 2;
  solarSystem.add(orbitRing);   // static — လည်မပတ်

  const planetGeo = new THREE.SphereGeometry(size, 20, 20);
  const planetMat = new THREE.MeshBasicMaterial({ color });
  const planet = new THREE.Mesh(planetGeo, planetMat);
  planet.position.x = distance;
  orbitGroup.add(planet);
  solarSystem.add(orbitGroup);

  return { group: orbitGroup, speed, distance };
}

const planets = [
  createPlanet(0.030, 0xaaaaaa, 0.32, 0.035),  // Mercury
  createPlanet(0.048, 0xff9944, 0.52, 0.022),  // Venus
  createPlanet(0.055, 0x3399ff, 0.72, 0.016),  // Earth
  createPlanet(0.042, 0xff4422, 0.92, 0.011),  // Mars
  createPlanet(0.080, 0xffcc88, 1.18, 0.007),  // Jupiter
  createPlanet(0.068, 0xffdd99, 1.46, 0.005),  // Saturn
  createPlanet(0.052, 0x88ddff, 1.72, 0.004),  // Uranus
  createPlanet(0.050, 0x4466ff, 1.96, 0.003),  // Neptune
];

// Ambient + Point light
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const sunLight = new THREE.PointLight(0xffffaa, 2, 15);
sunLight.position.set(3.2, 2.2, -1.5);
scene.add(sunLight);

// ══════════════════════════════════════════
// PHOTO DATA
// ══════════════════════════════════════════
// ══════════════════════════════════════════
// PHOTO DATA — GitHub ပုံများ + စာများ
// ══════════════════════════════════════════
const BASE = 'https://ksan72281-cyber.github.io/anniversary';
const photoData = [
  { url: BASE + '/01d15c787ec7edb8717ee1e7c6418a22.jpg', caption: 'မင်းကိုတွေ့ချင်တယ် ♡'    },
  { url: BASE + '/07a1b125f06e055e0ee48225ef1de6fe.jpg', caption: 'မင်းကိုသတိရတယ် ✿'        },
  { url: BASE + '/2d1c912e6593a42a9933e44ffb26decf.jpg', caption: 'မင်းကိုလွမ်းတယ် ✦'        },
  { url: BASE + '/ad6a18d03512f34b01c7ac4336788569.jpg', caption: 'မင်းကိုမြင်ချင်တယ် ✧'     },
  { url: BASE + '/f795de0df00ebe2d257a8316023560dc.jpg', caption: 'မင်းကိုတောင်ပန်ပါတယ် ♡'   },
  { url: BASE + '/4c788b774078e4ff43394b0c00800a42.gif', caption: 'မင်းကငါဘဝဘဲ ♡'           },
];
const N = photoData.length;

// ══════════════════════════════════════════
// HEXAGON FLOWER POSITIONS
// ══════════════════════════════════════════
const CARD_R = 0.36;
const D      = CARD_R * 2 + 0.005;
const H      = D * Math.sin(Math.PI/3);

const positions = [
  new THREE.Vector3(  0,   D,   0),
  new THREE.Vector3( -H,  D*.5, 0),
  new THREE.Vector3(  H,  D*.5, 0),
  new THREE.Vector3( -H, -D*.5, 0),
  new THREE.Vector3(  H, -D*.5, 0),
  new THREE.Vector3(  0,  -D,   0),
];

// ══════════════════════════════════════════
// CARD TEXTURE — ပုံ load + circle clip + glow border
// ══════════════════════════════════════════
const txLoader = new THREE.TextureLoader();
txLoader.crossOrigin = 'anonymous';

function makeTexture(ph) {
  // placeholder gradient ကို ချက်ချင်းပြ၊ ပုံ load ပြီးရင် အစားထိုး
  const S = 512;
  const c = document.createElement('canvas');
  c.width = c.height = S;
  const g = c.getContext('2d');

  // circle clip
  g.beginPath(); g.arc(S/2,S/2,S/2-2,0,Math.PI*2); g.clip();

  // placeholder gradient
  const gr = g.createRadialGradient(S*.35,S*.3,0,S/2,S/2,S/2);
  gr.addColorStop(0,'#cc2255'); gr.addColorStop(1,'#330011');
  g.fillStyle=gr; g.fillRect(0,0,S,S);

  // glow border
  g.beginPath(); g.arc(S/2,S/2,S/2-4,0,Math.PI*2);
  g.strokeStyle='rgba(255,180,220,.85)'; g.lineWidth=7;
  g.shadowColor='rgba(255,100,180,1)'; g.shadowBlur=22;
  g.stroke();

  const tex = new THREE.CanvasTexture(c);

  // ပုံ load ပြီးရင် canvas ပေါ် ထပ်ဆွဲ၊ texture update
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    g.clearRect(0,0,S,S);
    g.beginPath(); g.arc(S/2,S/2,S/2-2,0,Math.PI*2); g.clip();
    g.drawImage(img,0,0,S,S);
    // glow border ထပ်ဆွဲ
    g.beginPath(); g.arc(S/2,S/2,S/2-4,0,Math.PI*2);
    g.strokeStyle='rgba(255,180,220,.85)'; g.lineWidth=7;
    g.shadowColor='rgba(255,100,180,1)'; g.shadowBlur=22;
    g.stroke();
    tex.needsUpdate = true;
  };
  img.onerror = () => {
    // ပုံမရလျင် ♡ emoji ပြ
    g.clearRect(0,0,S,S);
    g.beginPath(); g.arc(S/2,S/2,S/2-2,0,Math.PI*2); g.clip();
    g.fillStyle=gr; g.fillRect(0,0,S,S);
    g.font=`${S*.35}px serif`; g.textAlign='center'; g.textBaseline='middle';
    g.fillStyle='rgba(255,255,255,.9)'; g.fillText('♡',S/2,S/2);
    g.beginPath(); g.arc(S/2,S/2,S/2-4,0,Math.PI*2);
    g.strokeStyle='rgba(255,180,220,.85)'; g.lineWidth=7; g.stroke();
    tex.needsUpdate = true;
  };
  img.src = ph.url;

  return tex;
}

// ══════════════════════════════════════════
// FLOWER GROUP
// ══════════════════════════════════════════
const flowerGroup = new THREE.Group();
scene.add(flowerGroup);

const meshes = [];
photoData.forEach((ph, i) => {
  const mesh = new THREE.Mesh(
    new THREE.CircleGeometry(CARD_R, 64),
    new THREE.MeshBasicMaterial({ map:makeTexture(ph), side:THREE.DoubleSide, transparent:true })
  );
  mesh.position.copy(positions[i]);
  mesh.userData = {
    base  : positions[i].clone(),
    speed : 0.3 + Math.random()*.2,
    phase : (i/N)*Math.PI*2,
    amp   : 0.018 + Math.random()*.015,
  };
  flowerGroup.add(mesh);
  meshes.push(mesh);
});

// ══════════════════════════════════════════
// LONG-PRESS CAROUSEL SYSTEM
// ══════════════════════════════════════════
const ray    = new THREE.Raycaster();
const mpos   = new THREE.Vector2();
const capEl  = document.getElementById('caption');
let   capTimer;
let   didDrag     = false;
let   isDragging  = false;
let   downX = 0, downY = 0;
let   prevX = 0, prevY = 0;
const dragThresh  = 8;

// Carousel state
let frontIndex = 0;
let isRotating = false;
let rotateProgress = 0;
let rotateFrom = [];
let rotateTo = [];

// Tap state
let tappedMesh = null;
let isDraggingFlower = false;


// Carousel rotation — ဖိတဲ့ပုံကို ရှေ့ဆုံးသို့ တိုက်ရိုက်ရောက်အောင် rotate
function startCarouselRotateTo(targetMesh){
  if(isRotating) return;

  // targetMesh ဟာ meshes[] မှာ ဘယ် index မှာလဲ ရှာ
  const tappedIdx = meshes.indexOf(targetMesh);
  if(tappedIdx === -1) return;

  // ယခု frontIndex ရှိတဲ့ mesh ဟာ positions[0] မှာ ရှိတယ်
  // tappedIdx ဟာ positions မှာ ဘယ်မှာရှိတာ စစ်ဖို့
  // positions[0] = ရှေ့ဆုံး (center front)
  // tappedMesh ရဲ့ base position နဲ့ positions[] နှိုင်းယှဉ်
  const tappedPos = targetMesh.userData.base;
  let tappedPosIdx = 0;
  let minDist = Infinity;
  positions.forEach((p, i) => {
    const d = tappedPos.distanceTo(p);
    if(d < minDist){ minDist = d; tappedPosIdx = i; }
  });

  // ရှေ့ဆုံး (index 0) မှာ ရှိနှင့်ပြီးရင် — caption ပဲပြ၊ rotate မလုပ်
  if(tappedPosIdx === 0){
    capEl.textContent = photoData[meshes.indexOf(targetMesh)].caption;
    capEl.classList.add('show');
    clearTimeout(capTimer);
    capTimer = setTimeout(()=> capEl.classList.remove('show'), 2500);
    return;
  }

  isRotating = true;
  rotateProgress = 0;

  // tappedPosIdx ကို 0 သို့ ရောက်အောင် shift လုပ်ရမယ့် ပမာဏ
  const steps = tappedPosIdx; // ဘယ်နှစ်ဆင့် shift လုပ်ရမလဲ

  rotateFrom = meshes.map(m => m.userData.base.clone());
  rotateTo = meshes.map((m, i) => {
    // mesh i ရဲ့ ယခု position index ရှာ
    const curPos = m.userData.base;
    let curPosIdx = 0;
    let md = Infinity;
    positions.forEach((p, pi) => {
      const d = curPos.distanceTo(p);
      if(d < md){ md = d; curPosIdx = pi; }
    });
    // steps ဆင့် ရှေ့တက်
    const newPosIdx = (curPosIdx - steps + N) % N;
    return positions[newPosIdx].clone();
  });

  // ဖိတဲ့ပုံ ရှေ့ရောက်ပြီ ဆိုတဲ့ caption ပြ
  capEl.textContent = photoData[meshes.indexOf(targetMesh)].caption;
  capEl.classList.add('show');
  clearTimeout(capTimer);
  capTimer = setTimeout(()=> capEl.classList.remove('show'), 2500);
}

// ── pointer down
let pressStartX = 0, pressStartY = 0;

function onPointerDown(cx, cy){
  downX = cx; downY = cy;
  prevX = cx; prevY = cy;
  pressStartX = cx; pressStartY = cy;
  didDrag = false;
  isDraggingFlower = false;

  mpos.x =  (cx/innerWidth )*2-1;
  mpos.y = -(cy/innerHeight)*2+1;
  ray.setFromCamera(mpos, camera);
  const hit = ray.intersectObjects(meshes);

  if(hit.length && !isRotating){
    tappedMesh = hit[0].object;
    controls.enabled = false;
  } else {
    tappedMesh = null;
    controls.enabled = true;
  }
}

// ── pointer move
function onPointerMove(cx, cy){
  const dx = cx - pressStartX, dy = cy - pressStartY;
  if(Math.sqrt(dx*dx+dy*dy) > dragThresh){
    didDrag = true;
    if(tappedMesh){
      // drag on photo → rotate flowerGroup relative to camera orientation
      isDraggingFlower = true;
      const deltaX = cx - prevX;
      const deltaY = cy - prevY;

      // camera ရဲ့ up/right direction နဲ့ align ဖြစ်အောင် quaternion သုံး
      const camRight = new THREE.Vector3();
      const camUp    = new THREE.Vector3();
      camera.getWorldDirection(new THREE.Vector3()); // ensure matrix updated
      camRight.setFromMatrixColumn(camera.matrixWorld, 0); // camera right axis
      camUp.setFromMatrixColumn(camera.matrixWorld, 1);    // camera up axis

      const qX = new THREE.Quaternion().setFromAxisAngle(camUp,    deltaX * 0.008);
      const qY = new THREE.Quaternion().setFromAxisAngle(camRight, deltaY * 0.008);

      flowerGroup.quaternion.premultiply(qX).premultiply(qY);
    }
  }
  prevX = cx; prevY = cy;
}

// ── pointer up
function onPointerUp(cx, cy){
  if(tappedMesh && !didDrag && !isRotating){
    startCarouselRotateTo(tappedMesh);
  }
  tappedMesh = null;
  isDraggingFlower = false;
  controls.enabled = true;
  isDragging = false;
}

// Mouse
renderer.domElement.addEventListener('mousedown',  e=> onPointerDown(e.clientX, e.clientY));
renderer.domElement.addEventListener('mousemove',  e=> onPointerMove(e.clientX, e.clientY));
renderer.domElement.addEventListener('mouseup',    e=> onPointerUp(e.clientX, e.clientY));

// Touch
renderer.domElement.addEventListener('touchstart', e=>{
  if(e.touches.length===1) onPointerDown(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:true});
renderer.domElement.addEventListener('touchmove',  e=>{
  if(e.touches.length===1) onPointerMove(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:true});
renderer.domElement.addEventListener('touchend',   e=>{
  if(e.changedTouches.length) onPointerUp(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, {passive:true});

// ══════════════════════════════════════════
// ANIMATE
// ══════════════════════════════════════════
function animate(){
  requestAnimationFrame(animate);
  const t = performance.now() * .001;

  // Carousel rotation animation
  if(isRotating){
    rotateProgress = Math.min(rotateProgress + 0.018, 1);
    // easeInOutCubic
    const ease = rotateProgress < 0.5
      ? 4 * rotateProgress * rotateProgress * rotateProgress
      : 1 - Math.pow(-2 * rotateProgress + 2, 3) / 2;

    meshes.forEach((m, i) => {
      const from = rotateFrom[i];
      const to   = rotateTo[i];
      m.userData.base.lerpVectors(from, to, ease);
    });

    if(rotateProgress >= 1){
      // Snap final positions
      meshes.forEach((m, i) => {
        m.userData.base.copy(rotateTo[i]);
      });
      isRotating = false;
      rotateProgress = 0;
    }
  }

  // flower cards float + face camera
  meshes.forEach(m => {
    const d = m.userData;
    m.position.x = d.base.x;
    m.position.z = d.base.z;
    m.position.y = d.base.y + Math.sin(t * d.speed + d.phase) * d.amp;
    m.lookAt(camera.position);
    m.scale.setScalar(1.0);
  });

  // 3D hearts float & rotate
  floatingHearts.forEach(h => {
    const d = h.userData;
    h.position.y = d.baseY + Math.sin(t * d.floatSpeed + d.phase) * d.floatAmp;
    h.rotation.y += d.rotSpeed;
    h.rotation.z += d.rotSpeed * 0.5;
  });

  // solar system planets orbit — Y axis (မူလအတိုင်း)
  planets.forEach(p => {
    p.group.rotation.y += p.speed;
  });

  controls.update();
  renderer.render(scene, camera);
}
animate();
